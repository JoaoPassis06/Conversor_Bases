    <style>

        #container {

            display: flex;

        .calculadora {

            width: 500px;

        #T2,
        .caixa_button {
            width: 100%;

            display: flex;
            align-items: center;
            flex-direction: column;
            justify-content: center;
        }

        .primeiro {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            flex-direction: row;
            justify-content: space-evenly;

        #base1 , #base2 {
            margin-bottom: 7px;
        }

            display: flex;
            flex-direction: row;
        }
        #meio{
            padding: 10px 0px;
        }

        #T2 {
            display: none;
        }

        h2 {
            margin: auto auto 10px auto;
            color: rgba(0, 0, 0, 0.79);
            font-size: 30px;
            width: 100%;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.71);
            border: 1px solid white;
            margin-top: 0px;
            padding: 13px;
            font-family: Poppins;
            font-weight: bolder;
            letter-spacing: 1px;

        }

        h3 {

            color: white;
            font-size: 19px;
            font-weight: lighter;
            font-family: Poppins;
        }

        select {
            text-align: center;
            padding: 5px;
            cursor: pointer;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Source Code Pro';
            border: 1px solid #c9d6ff;
        }

        input {
            border-radius: 10px;
            padding: 5px;
            font-size: 16px;
            margin-bottom: 10px;
            font-family: 'Source Code Pro';
            text-align: center;
            border: 1px solid #c9d6ff;

        }

        input:focus {
            outline: none;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2);
        }

        label {
            margin: 15px 0px;
            color: white;
            font-weight: lighter;
            font-size: 18px;
            cursor: pointer;
            font-family: Poppins;

        }

        button {
            padding: 12px 25px;
            margin: 15px;

            border-radius: 10px;
            border: none;

            background-color: #293d9f;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);

            font-weight: bold;
            font-family: Montserrat;


            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #3b4582;
            transform: translateY(-2px);
        }

        #div_resposta {

            display: none;

            flex-direction: column;
            align-items: center;
            justify-content: center;

            background-color: #5570c7e6;
            overflow: hidden;

            height: 100%;
            width: 400px;
            margin-top: 60px;

            border-radius: 5%;
            box-shadow: 3px 5px 20px rgba(59, 88, 205, 0.536);


        }



        #div_resposta p {
            margin: 10px 0px;
            font-size: 20px;
            color: rgba(0, 0, 0, 0.896);
            font-weight: normal;
            font-family: Poppins, sans-serif;
            line-height: 1.5;

        }

        .primeiro {
            margin-top: 0px;
        }

        span {
            font-size: 18px;
            color: #d9e2ff;
            border-radius: 5px;
            font-weight: bold;
            font-family: 'Roboto';
            margin-bottom: 5px;


        }

        #div_resposta div {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #div_resposta div:last-child {
            border: none;
        }

        #cor1 {
            border-bottom: 3px solid rgba(55, 239, 168, 0.601);
        }

        #cor2 {
            border-bottom: 3px solid rgba(86, 23, 233, 0.634);
        }

        #cor3 {
            border-bottom: 3px solid rgba(55, 239, 168, 0.601);
        }

        .ultimo {
            margin-bottom: 10px;
        }

        footer {

            display: flex;
            flex-direction: column;
            align-items: center;




            width: 100%;

            position: relative;

            padding: 13px 0;

            color: #fff;
            font-family: 'Poppins', sans-serif;

            border-top: 1px solid #1a1a1a;

</head>

<body>
    <header>

        <h1>SPTecher's Machine</h1>

    </header>
    <div id="container">
        <div class="calculadora">
            <div id="T2">
                <h2>Calculadora De Base</h2>


                <label for="input_n1">Digite o primeiro número</label>
                <div class="primeiro">
                    <input type="number" id="input_n1" placeholder="Insira o número">
                    <select id="base1">
                        <option value="0" selected disabled class="op0">Base</option>
                        <option value="1">Octal</option>
                        <option value="2">Binário</option>
                        <option value="3">Hexadecimal</option>
                        <option value="4">Decimal</option>
                    </select>
                </div>


                <label for="input_n2" id="meio">Digite o segundo número</label>
                <div class="primeiro">
                    <input type="number" id="input_n2" placeholder="Insira o número">
                    <select id="base2">
                        <option value="0" selected disabled class="op0">Base</option>
                        <option value="1">Octal</option>
                        <option value="2">Binário</option>
                        <option value="3">Hexadecimal</option>
                        <option value="4">Decimal</option>
                    </select>
                </div>
                <label for="operacao">Operações disponiveis</label>
                <select style="margin-top: 10px;" id="operacao">
                    <option value="#">Operações</option>
                    <option value="soma">+</option>
                    <option value="subtracao">-</option>
                    <option value="divisao">/</option>
                    <option value="multiplicacao">x</option>
                </select>

            </div>
            <div id="T1">
                <h2>Converter Bases</h2>
                <h3>Escolha a base de conversão</h3>
                <select id="numerico">
                    <option value="0" selected disabled class="op0">Selecione a opção</option>
                    <option value="1">Octal</option>
                    <option value="2">Binário</option>
                    <option value="3">Hexadecimal</option>
                    <option value="4">Decimal</option>
                </select>
                <label for="input_n">Digite um número / letra</label>
                <input type="text" id="input_n" placeholder="Insira o número">
            </div>

            <div class="caixa_button">
                <button id="botao1" onclick="converter()">Converter</button>
                <button  id="botao2" onclick="calcular()">Quero Calcular</button>
            </div>


        </div>
        <div id="div_resposta">

        </div>


    </div>
    <footer id="pe">
        <p>&copy; 2025 SPTECHER'S MACHINE. Todos os direitos reservados.</p>
        <p>Desenvolvido por João Pedro Assis</p>
    </footer>
</body>

</html>
<script>
function alternarBotao(){
     var mudar1 = botao1.textContent; 
    var mudar2 = botao2.textContent;

    if(mudar2 === 'Quero Calcular'){
            botao2.textContent = 'Calcular';
            botao1.textContent = 'Quero Converter'
        }
        if(mudar1 == 'Quero convertar'){
            botao1.textContent = 'Converter';
            botao2.textContent = 'Quero Converter'
        }

}
    function converter() {

        div_resposta.style.display = 'flex';

        T2.style.display = 'none';
        T1.style.display = 'flex';
        var base = numerico.value;
        var numero = input_n.value.trim();

        // Fazendo a validação dos números digitados

        



        if (base == "4" && !/^[0-9]+$/.test(numero)) {
            alert("Digite apenas números de 0 a 9");
            div_resposta.style.display = 'none';
            return;

        }
        if (base == "1" && !/^[0-7]+$/.test(numero)) {
            alert("Digite apenas números de 0 a 7");
            div_resposta.style.display = 'none';
            return;

        }
        if (base == "2" && !/^[01]+$/.test(numero)) {
            alert("Digite apenas 0 ou 1");
            div_resposta.style.display = 'none';
            return;

        }
        if (base == "3" && !/^[0-9A-Fa-f]+$/.test(numero)) {
            alert("Digite apenas números de 0 a 9 e letras de A a F");
            div_resposta.style.display = 'none';
            return;

        }
        if (base == '4') {
            numero = Number(numero);
        }

        else if (base == '1') {
            numero = parseInt(numero, 8);
        }

        else if (base == '3') {
            numero = parseInt(numero, 16);
        }

        else {
            numero = parseInt(numero, 2);
        }
        if (base != '2' && base != '3' && base != '4' && base != '1') {
            
            alert('Bem-vindo a Machine JP');
            
            alert('Escolha uma base');
            div_resposta.style.display = 'none';
        }
        

        else {

            div_resposta.innerHTML = `
            <h2>Convertido</h2>
                <div id = 'cor1'>
                    <p>Decimal</p> <span>${numero.toString(10)}</span>
                </div>
            
                <div id ='cor2'>
                    <p id='hexadecimal'>Hexadecimal </p><span>${numero.toString(16).toUpperCase()}</span>
                </div>
           
                
                <div id ='cor3'>
                    <p id='binario'>Binário</p><span> ${numero.toString(2)}</span>
                </div>
                
            
            <div id ='cor4'>
                <p id='octal'>Octal</p> <span class = 'ultimo'>${numero.toString(8)}</span>
            </div>
        `;


            decimal.style.display = 'none';
            octal.style.display = 'none';
            binario.style.display = 'none'; hexadecimal.style.display = 'none';


        }
        alternarBotao();
        }
    
        function calcular() {
           
    // Esconder a primeira aba e mostrar a segunda
    T1.style.display = 'none';
    T2.style.display = 'flex';
    div_resposta.style.display = 'flex';

    var mudar1 = botao1.textContent; 
    var mudar2 = botao2.textContent;


    // 1. Obter os elementos do HTML
    const input_n1 = document.getElementById('input_n1');
    const input_n2 = document.getElementById('input_n2');
    const base1 = document.getElementById('base1');
    const base2 = document.getElementById('base2');
    const operacao = document.getElementById('operacao');

    // 2. Obter os valores dos elementos
    const num1 = input_n1.value.trim();
    const base1Value = base1.value;
    const num2 = input_n2.value.trim();
    const base2Value = base2.value;
    const operacaoValue = operacao.value;

    // 3. Validação dos dados de entrada
    if (!num1 || base1Value === "0" || !num2 || base2Value === "0" || operacaoValue === "#") {
        alert("Preencha todos os campos corretamente!");
        div_resposta.style.display = 'none';
        return;
    }

    // 4. Conversão para decimal
    let valor1Decimal;
    let valor2Decimal;
    
    try {
        if (base1Value === "1") { valor1Decimal = parseInt(num1, 8); }
        else if (base1Value === "2") { valor1Decimal = parseInt(num1, 2); }
        else if (base1Value === "3") { valor1Decimal = parseInt(num1, 16); }
        else if (base1Value === "4") { valor1Decimal = parseInt(num1, 10); }

        if (base2Value === "1") { valor2Decimal = parseInt(num2, 8); }
        else if (base2Value === "2") { valor2Decimal = parseInt(num2, 2); }
        else if (base2Value === "3") { valor2Decimal = parseInt(num2, 16); }
        else if (base2Value === "4") { valor2Decimal = parseInt(num2, 10); }
    } catch (e) {
        alert("Erro na conversão. Verifique se os números são válidos para as bases selecionadas.");
        div_resposta.style.display = 'none';
        return;
    }

    // 5. Execução da operação com base no valor do select
    let resultadoDecimal;
    switch (operacaoValue) {
        case "soma":
            resultadoDecimal = valor1Decimal + valor2Decimal;
            break;
        case "subtracao":
            resultadoDecimal = valor1Decimal - valor2Decimal;
            break;
        case "multiplicacao":
            resultadoDecimal = valor1Decimal * valor2Decimal;
            break;
        case "divisao":
            if (valor2Decimal === 0) {
                alert("Não é possível dividir por zero!");
                div_resposta.style.display = 'none';
                return;
            }
            resultadoDecimal = valor1Decimal / valor2Decimal;
            break;
        default:
             alert("Operação inválida. Selecione uma das opções.");
             div_resposta.style.display = 'none';
             return;
    }
    
    if (isNaN(resultadoDecimal)) {
      alert("Erro na operação. Verifique se os números de entrada são válidos.");
      div_resposta.style.display = 'none';
      return;
    }

    // 6. Conversão do resultado para outras bases
    const resultadoOctal = Math.floor(resultadoDecimal).toString(8);
    const resultadoBinario = Math.floor(resultadoDecimal).toString(2);
    const resultadoHexa = Math.floor(resultadoDecimal).toString(16).toUpperCase();

    // 7. Exibição do resultado na tela
    div_resposta.innerHTML = `
        <h2>Resultado</h2>
        <div id="cor1">
            <p>Decimal</p> <span>${resultadoDecimal}</span>
        </div>
        <div id="cor2">
            <p>Hexadecimal</p> <span>${resultadoHexa}</span>
        </div>
        <div id="cor3">
            <p>Binário</p> <span>${resultadoBinario}</span>
        </div>
        <div id="cor4">
            <p>Octal</p> <span class="ultimo">${resultadoOctal}</span>
        </div>
    `;

    document.querySelectorAll('#div_resposta p').forEach(p => p.style.display = 'block');
    document.querySelectorAll('#div_resposta span').forEach(span => span.style.display = 'block');
    alternarBotao();
}


</script>
